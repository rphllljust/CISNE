version: '3.9'

name: oms-production

services:
  postgres:
    image: postgres:16-alpine
    container_name: oms-postgres
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-oms}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-oms}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - oms-internal
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-oms} -d ${POSTGRES_DB:-oms}']
      interval: 10s
      timeout: 5s
      retries: 5

  migrate:
    build:
      context: .
      dockerfile: Dockerfile
      target: migrator
    container_name: oms-migrate
    restart: 'no'
    env_file:
      - .env.production
    depends_on:
      postgres:
        condition: service_healthy
    command: npx prisma migrate deploy
    networks:
      - oms-internal

  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    container_name: oms-api
    restart: unless-stopped
    env_file:
      - .env.production
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    expose:
      - '3000'
    networks:
      - oms-internal
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:3000/api/v1/health || exit 1']
      interval: 15s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        API_UPSTREAM: http://api:3000
    container_name: oms-frontend
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    expose:
      - '80'
    networks:
      - oms-internal

  edge:
    image: caddy:2.8-alpine
    container_name: oms-edge
    restart: unless-stopped
    env_file:
      - .env.production
    depends_on:
      frontend:
        condition: service_healthy
      api:
        condition: service_healthy
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./infra/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
      - caddy_logs:/var/log/caddy
    networks:
      - oms-internal

volumes:
  postgres_data:
  caddy_data:
  caddy_config:
  caddy_logs:

networks:
  oms-internal:
    driver: bridge
